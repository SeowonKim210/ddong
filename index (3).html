<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💩 급똥 비상방송</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="급똥방송">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Google Analytics — GA4 설정 후 G-XXXXXXXXXX를 실제 측정 ID로 교체 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6PMYCDY5BM"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-6PMYCDY5BM');
  function ga(action, p){ gtag('event', action, p||{}); }
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0a0a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
}

.wrap {
  text-align: center;
  padding: 24px;
  user-select: none;
}

h1 {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 22px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 48px;
  letter-spacing: 1px;
}

/* 똥 버튼 */
.poop-btn {
  background: none;
  border: none;
  cursor: pointer;
  display: block;
  margin: 0 auto 48px;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.08s;
  line-height: 1;
  padding: 0;
}
.poop-btn:active { transform: scale(0.88); }

.poop-emoji {
  font-size: 120px;
  display: block;
  filter: drop-shadow(0 0 0px rgba(255,200,0,0));
  transition: filter 0.1s, transform 0.1s;
  animation: idle 2.5s ease-in-out infinite;
}
@keyframes idle {
  0%,100%{ transform: translateY(0) rotate(-3deg); }
  50%    { transform: translateY(-8px) rotate(3deg); }
}

.poop-btn.shaking .poop-emoji {
  animation: shake-hard 0.08s linear infinite;
  filter: drop-shadow(0 0 30px rgba(180,100,0,0.9));
}
@keyframes shake-hard {
  0%  { transform: translate(-5px,-3px) rotate(-8deg) scale(1.12); }
  25% { transform: translate(5px, 3px) rotate( 8deg) scale(1.15); }
  50% { transform: translate(-4px, 4px) rotate(-6deg) scale(1.1); }
  75% { transform: translate(4px,-4px) rotate( 6deg) scale(1.13); }
  100%{ transform: translate(-5px,-3px) rotate(-8deg) scale(1.12); }
}

/* 상태 텍스트 */
.status {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 18px;
  color: rgba(255,255,255,0.18);
  min-height: 28px;
  transition: color 0.2s;
  letter-spacing: 1px;
}
.status.on { color: #FFD600; }

/* 배경 펄스 */
.bg-flash {
  position: fixed; inset: 0;
  pointer-events: none;
  opacity: 0;
  background: radial-gradient(ellipse at center, rgba(150,80,0,0.35) 0%, transparent 70%);
  transition: opacity 0.05s;
}
.bg-flash.on { opacity: 1; }
</style>
</head>
<body>

<div class="bg-flash" id="bg-flash"></div>

<div class="wrap">
  <h1>눌러서 눈치주기</h1>

  <button class="poop-btn" id="poop-btn" onclick="doIt()">
    <span class="poop-emoji">💩</span>
  </button>

  <div class="status" id="status">똥 누르면 됩니다</div>
</div>

<script>
// ── TTS 멘트 ──────────────────────────────
const LINES = [
  '똥 쌀 것 같아요.. 똥 마려워요!',
  '똥 마려워요! 빨리 나와주세요!',
  '똥 쌀 것 같아요.. 제발요!',
  '저 똥 마려워요! 진짜예요!',
];
let lineIdx  = 0;
let speaking = false;
let voiceList = [];

function loadVoices() { voiceList = speechSynthesis.getVoices(); }
loadVoices();
if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}
function pickVoice() {
  return (
    voiceList.find(v => v.lang.startsWith('ko') && /male|남|man/i.test(v.name)) ||
    voiceList.find(v => v.lang.startsWith('ko') && v.name.includes('Google')) ||
    voiceList.find(v => v.lang.startsWith('ko')) ||
    voiceList[0] || null
  );
}

// ── Audio Context ─────────────────────────
let ctx = null;
function initCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state === 'suspended') ctx.resume();
}

// ── 불쾌한 똥/방귀 소리 합성 ─────────────
function makeNoiseBuffer(sec) {
  const buf  = ctx.createBuffer(1, ctx.sampleRate * sec, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  return buf;
}

function fartLayer(startT, duration, startHz, endHz, vol) {
  const src = ctx.createBufferSource();
  src.buffer = makeNoiseBuffer(duration + 0.1);

  const lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.Q.value = 14;
  lpf.frequency.setValueAtTime(startHz, startT);
  lpf.frequency.exponentialRampToValueAtTime(endHz, startT + duration);

  const bpf = ctx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.value = 180;
  bpf.Q.value = 1.5;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, startT);
  gain.gain.linearRampToValueAtTime(vol, startT + 0.015);
  gain.gain.setValueAtTime(vol, startT + duration * 0.6);
  gain.gain.exponentialRampToValueAtTime(0.001, startT + duration);

  src.connect(lpf); lpf.connect(bpf); bpf.connect(gain); gain.connect(ctx.destination);
  src.start(startT); src.stop(startT + duration + 0.12);
}

function wetLayer(startT, duration, vol) {
  const src = ctx.createBufferSource();
  src.buffer = makeNoiseBuffer(duration + 0.1);

  const hpf = ctx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 900;
  hpf.Q.value = 2;

  const lpf2 = ctx.createBiquadFilter();
  lpf2.type = 'lowpass';
  lpf2.frequency.value = 3200;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, startT);
  gain.gain.linearRampToValueAtTime(vol, startT + 0.01);
  gain.gain.linearRampToValueAtTime(0, startT + duration);

  src.connect(hpf); hpf.connect(lpf2); lpf2.connect(gain); gain.connect(ctx.destination);
  src.start(startT); src.stop(startT + duration + 0.05);
}

function bubbleLayer(startT) {
  for (let i = 0; i < 5; i++) {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    const t    = startT + i * 0.07;
    const freq = 120 + Math.random() * 80;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.4, t + 0.12);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.16);
  }
}

function playPoopSound() {
  initCtx();
  const t = ctx.currentTime + 0.05;

  fartLayer(t,       0.18, 420, 90,  1.8);
  wetLayer (t,       0.10, 0.15);

  fartLayer(t+0.22,  0.13, 350, 110, 1.6);
  wetLayer (t+0.22,  0.10, 0.18);
  fartLayer(t+0.38,  0.11, 310, 95,  1.5);
  wetLayer (t+0.38,  0.08, 0.16);
  fartLayer(t+0.52,  0.15, 380, 80,  1.7);
  wetLayer (t+0.52,  0.12, 0.20);

  fartLayer(t+0.72,  0.55, 280, 45,  2.0);
  wetLayer (t+0.72,  0.40, 0.25);

  bubbleLayer(t + 1.28);

  fartLayer(t+1.45,  0.12, 200, 60,  1.0);
  wetLayer (t+1.45,  0.08, 0.10);
}

// ── TTS ──────────────────────────────────
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = pickVoice();
  if (v) u.voice = v;
  u.lang   = 'ko-KR';
  u.rate   = 0.80;
  u.pitch  = 0.4;
  u.volume = 1.0;
  u.onstart = () => { speaking = true; };
  const done = () => { speaking = false; };
  u.onend   = done;
  u.onerror = done;
  speechSynthesis.speak(u);
}

// ── 메인 ─────────────────────────────────
let busy = false;

function doIt() {
  if (busy) return;
  busy = true;

  const btn     = document.getElementById('poop-btn');
  const status  = document.getElementById('status');
  const bgFlash = document.getElementById('bg-flash');

  playPoopSound();

  const line = LINES[lineIdx % LINES.length];
  lineIdx++;
  // 소리 시작 0.3초 후 TTS (방귀소리 먼저 들리게)
  setTimeout(() => speak(line), 300);

  btn.classList.add('shaking');
  bgFlash.classList.add('on');
  status.textContent = line;
  status.className   = 'status on';

  setTimeout(() => bgFlash.classList.remove('on'), 300);

  setTimeout(() => {
    btn.classList.remove('shaking');
    status.textContent = '또 누르세요';
    status.className   = 'status';
    busy = false;
  }, 1800);

  ga('poop_press', { line_idx: lineIdx });
}

// ── Service Worker 등록 (PWA) ─────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
